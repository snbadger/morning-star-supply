<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Morning Star Supply Order</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; -webkit-tap-highlight-color: transparent; }

/* Header */
.header { background: linear-gradient(135deg, #1a5276, #2980b9); color: white; padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header h1 { font-size: 18px; font-weight: 600; }
.header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }
.header .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 6px; font-size: 14px; cursor: pointer; margin-right: 10px; }

/* Progress bar */
.progress-bar { background: rgba(255,255,255,0.2); height: 6px; border-radius: 3px; margin-top: 10px; }
.progress-fill { background: #2ecc71; height: 100%; border-radius: 3px; transition: width 0.3s ease; }

/* Location cards */
.locations { padding: 16px; }
.location-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: transform 0.15s; }
.location-card:active { transform: scale(0.98); }
.location-name { font-size: 17px; font-weight: 600; }
.location-count { font-size: 13px; color: #666; margin-top: 2px; }
.location-badge { display: flex; align-items: center; gap: 8px; }
.badge { font-size: 12px; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
.badge-pending { background: #fff3cd; color: #856404; }
.badge-done { background: #d4edda; color: #155724; }
.badge-partial { background: #cce5ff; color: #004085; }
.chevron { color: #999; font-size: 20px; }

/* Item view */
.item-view { padding: 16px; }
.item-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.item-number { font-size: 11px; color: #999; font-family: monospace; }
.item-desc { font-size: 15px; font-weight: 500; margin: 4px 0; line-height: 1.3; }
.item-par { font-size: 13px; color: #666; }
.item-notes { font-size: 12px; color: #e67e22; margin-top: 4px; font-style: italic; }

/* Status buttons */
.status-btns { display: flex; gap: 8px; margin-top: 12px; }
.status-btn { flex: 1; padding: 12px 8px; border: 2px solid #ddd; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; background: white; }
.status-btn:active { transform: scale(0.95); }
.status-btn.full { border-color: #27ae60; color: #27ae60; }
.status-btn.full.selected { background: #27ae60; color: white; }
.status-btn.low { border-color: #f39c12; color: #f39c12; }
.status-btn.low.selected { background: #f39c12; color: white; }
.status-btn.empty { border-color: #e74c3c; color: #e74c3c; }
.status-btn.empty.selected { background: #e74c3c; color: white; }

/* Summary view */
.summary { padding: 16px; }
.summary-header { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.summary-sub { font-size: 14px; color: #666; margin-bottom: 16px; }
.summary-section { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.summary-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #1a5276; }
.summary-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
.summary-item:last-child { border-bottom: none; }
.order-qty { font-weight: 700; color: #e74c3c; min-width: 50px; text-align: right; }
.order-qty.low-qty { color: #f39c12; }

/* Stats bar */
.stats-bar { display: flex; justify-content: space-around; padding: 12px; background: white; margin: 0 16px 12px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.stat { text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 11px; color: #666; }
.stat-num.green { color: #27ae60; }
.stat-num.orange { color: #f39c12; }
.stat-num.red { color: #e74c3c; }
.stat-num.gray { color: #999; }

/* Bottom action bar */
.action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: white; box-shadow: 0 -2px 8px rgba(0,0,0,0.1); z-index: 100; display: flex; gap: 10px; }
.action-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
.btn-primary { background: #2980b9; color: white; }
.btn-secondary { background: #ecf0f1; color: #333; }
.btn-export { background: #27ae60; color: white; }
.btn-danger { background: #e74c3c; color: white; }
.action-btn:active { opacity: 0.8; }

/* Search */
.search-bar { padding: 10px 16px 0; }
.search-input { width: 100%; padding: 10px 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; }
.search-input:focus { border-color: #2980b9; }

/* Filter pills */
.filter-pills { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-pill { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid #ddd; background: white; cursor: pointer; white-space: nowrap; }
.filter-pill.active { background: #2980b9; color: white; border-color: #2980b9; }

/* Spacer for fixed bottom bar */
.bottom-spacer { height: 80px; }

/* Toast notification */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Mark all buttons */
.mark-all-row { display: flex; gap: 6px; padding: 4px 16px 8px; }
.mark-all-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid; }
.mark-all-full { border-color: #27ae60; color: #27ae60; background: white; }
.mark-all-full:active { background: #27ae60; color: white; }
</style>
</head>

// State
let state = {
  view: 'locations',  // locations | items | summary
  currentLocation: null,
  statuses: {},      // itemNumber -> 'full' | 'low' | 'empty'
  search: '',
  filter: 'all'       // all | pending | low | empty
};

// Load saved state from memory (sessionStorage alternative)
try {
  const saved = window.__savedState;
  if (saved) state.statuses = saved;
} catch(e) {}

function saveState() {
  window.__savedState = state.statuses;
}

// Group items by location
const LOCATIONS = {};
ITEMS.forEach(item => {
  if (!LOCATIONS[item.location]) LOCATIONS[item.location] = [];
  LOCATIONS[item.location].push(item);
});

// Location display order
const LOC_ORDER = ['West Hall', 'Med Room', 'Supply Closet', 'Nurses Station', 'Housekeeping', 'Unassigned'];

function getLocationStats(loc) {
  const items = LOCATIONS[loc] || [];
  let full = 0, low = 0, empty = 0, pending = 0;
  items.forEach(item => {
    const s = state.statuses[item.itemNumber];
    if (s === 'full') full++;
    else if (s === 'low') low++;
    else if (s === 'empty') empty++;
    else pending++;
  });
  return { full, low, empty, pending, total: items.length };
}

function getOverallStats() {
  let full = 0, low = 0, empty = 0, pending = 0;
  ITEMS.forEach(item => {
    const s = state.statuses[item.itemNumber];
    if (s === 'full') full++;
    else if (s === 'low') low++;
    else if (s === 'empty') empty++;
    else pending++;
  });
  return { full, low, empty, pending, total: ITEMS.length };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setStatus(itemNumber, status) {
  if (state.statuses[itemNumber] === status) {
    delete state.statuses[itemNumber];  // toggle off
  } else {
    state.statuses[itemNumber] = status;
  }
  saveState();
  render();
}

function markAllInLocation(loc, status) {
  const items = LOCATIONS[loc] || [];
  items.forEach(item => {
    if (!state.statuses[item.itemNumber]) {
      state.statuses[item.itemNumber] = status;
    }
  });
  saveState();
  render();
  showToast('Unmarked items set to ' + status.toUpperCase());
}

function getOrderItems() {
  const orderItems = [];
  ITEMS.forEach(item => {
    const s = state.statuses[item.itemNumber];
    if (s === 'low') {
      orderItems.push({ ...item, orderQty: Math.ceil(item.par * 0.5), status: 'low' });
    } else if (s === 'empty') {
      orderItems.push({ ...item, orderQty: item.par, status: 'empty' });
    }
  });
  return orderItems;
}

function exportCSV() {
  const orderItems = getOrderItems();
  if (orderItems.length === 0) {
    showToast('Nothing to order!');
    return;
  }
  let csv = 'Location,Item Number,Description,Par,Status,Order Qty\n';
  orderItems.forEach(item => {
    const desc = item.description.replace(/,/g, ';');
    csv += item.location + ',' + item.itemNumber + ',"' + desc + '",' + item.par + ',' + item.status.toUpperCase() + ',' + item.orderQty + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const today = new Date().toISOString().split('T')[0];
  a.download = 'MorningStar_Order_' + today + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Order exported!');
}

function resetAll() {
  if (confirm('Clear all counts and start over?')) {
    state.statuses = {};
    saveState();
    state.view = 'locations';
    render();
    showToast('All counts cleared');
  }
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function render() {
  const app = document.getElementById('app');

  if (state.view === 'locations') {
    renderLocations(app);
  } else if (state.view === 'items') {
    renderItems(app);
  } else if (state.view === 'summary') {
    renderSummary(app);
  }
}

function renderLocations(app) {
  const stats = getOverallStats();
  const pct = Math.round(((stats.total - stats.pending) / stats.total) * 100);

  let html = '<div class="header">';
  html += '<h1>Morning Star Supply Order</h1>';
  html += '<div class="subtitle">' + new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) + '</div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  // Overall stats
  html += '<div class="stats-bar">';
  html += '<div class="stat"><div class="stat-num green">' + stats.full + '</div><div class="stat-label">Full</div></div>';
  html += '<div class="stat"><div class="stat-num orange">' + stats.low + '</div><div class="stat-label">Low</div></div>';
  html += '<div class="stat"><div class="stat-num red">' + stats.empty + '</div><div class="stat-label">Empty</div></div>';
  html += '<div class="stat"><div class="stat-num gray">' + stats.pending + '</div><div class="stat-label">Unchecked</div></div>';
  html += '</div>';

  html += '<div class="locations">';
  LOC_ORDER.forEach(loc => {
    if (!LOCATIONS[loc]) return;
    const s = getLocationStats(loc);
    let badgeClass = 'badge-pending';
    let badgeText = s.total + ' items';
    if (s.pending === 0) {
      badgeClass = 'badge-done';
      badgeText = '\u2713 Done';
    } else if (s.pending < s.total) {
      badgeClass = 'badge-partial';
      badgeText = (s.total - s.pending) + '/' + s.total;
    }

    html += '<div class="location-card" onclick="state.currentLocation=\'' + loc + '\';state.view=\'items\';state.search=\'\';state.filter=\'all\';render()">';
    html += '<div><div class="location-name">' + loc + '</div>';
    html += '<div class="location-count">' + s.total + ' items';
    if (s.low > 0) html += ' &middot; <span style="color:#f39c12">' + s.low + ' low</span>';
    if (s.empty > 0) html += ' &middot; <span style="color:#e74c3c">' + s.empty + ' empty</span>';
    html += '</div></div>';
    html += '<div class="location-badge"><span class="badge ' + badgeClass + '">' + badgeText + '</span><span class="chevron">\u203A</span></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="bottom-spacer"></div>';
  html += '<div class="action-bar">';
  const orderCount = getOrderItems().length;
  html += '<button class="action-btn btn-secondary" onclick="resetAll()">Reset</button>';
  html += '<button class="action-btn btn-primary" onclick="state.view=\'summary\';render()">Review Order' + (orderCount > 0 ? ' (' + orderCount + ')' : '') + '</button>';
  html += '</div>';

  app.innerHTML = html;
}

function renderItems(app) {
  const loc = state.currentLocation;
  let items = LOCATIONS[loc] || [];
  const locStats = getLocationStats(loc);

  // Apply search filter
  if (state.search) {
    const q = state.search.toLowerCase();
    items = items.filter(i => i.description.toLowerCase().includes(q) || i.itemNumber.toLowerCase().includes(q));
  }

  // Apply status filter
  if (state.filter === 'pending') {
    items = items.filter(i => !state.statuses[i.itemNumber]);
  } else if (state.filter === 'low') {
    items = items.filter(i => state.statuses[i.itemNumber] === 'low');
  } else if (state.filter === 'empty') {
    items = items.filter(i => state.statuses[i.itemNumber] === 'empty');
  }

  const pct = Math.round(((locStats.total - locStats.pending) / locStats.total) * 100);

  let html = '<div class="header">';
  html += '<div style="display:flex;align-items:center"><button class="back-btn" onclick="state.view=\'locations\';render()">\u2190 Back</button>';
  html += '<div><div style="font-size:17px;font-weight:600">' + loc + '</div>';
  html += '<div class="subtitle">' + locStats.pending + ' unchecked of ' + locStats.total + '</div></div></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  // Search
  html += '<div class="search-bar"><input class="search-input" type="text" placeholder="Search items..." value="' + (state.search || '') + '" oninput="state.search=this.value;render()" id="searchInput"></div>';

  // Filter pills
  html += '<div class="filter-pills">';
  ['all', 'pending', 'low', 'empty'].forEach(f => {
    const active = state.filter === f ? ' active' : '';
    let label = f.charAt(0).toUpperCase() + f.slice(1);
    if (f === 'all') label = 'All (' + (LOCATIONS[loc] || []).length + ')';
    else if (f === 'pending') label = 'Unchecked (' + locStats.pending + ')';
    else if (f === 'low') label = 'Low (' + locStats.low + ')';
    else if (f === 'empty') label = 'Empty (' + locStats.empty + ')';
    html += '<div class="filter-pill' + active + '" onclick="state.filter=\'' + f + '\';render()">' + label + '</div>';
  });
  html += '</div>';

  // Mark all remaining as Full button
  if (locStats.pending > 0) {
    html += '<div class="mark-all-row">';
    html += '<button class="mark-all-btn mark-all-full" onclick="markAllInLocation(\'' + loc + '\', \'full\')">Mark all unchecked as FULL</button>';
    html += '</div>';
  }

  // Items
  html += '<div class="item-view">';
  if (items.length === 0) {
    html += '<div style="text-align:center;padding:40px;color:#999">No items match your filter</div>';
  }
  items.forEach(item => {
    const s = state.statuses[item.itemNumber] || '';
    html += '<div class="item-card">';
    html += '<div class="item-number">' + item.itemNumber + '</div>';
    html += '<div class="item-desc">' + item.description + '</div>';
    html += '<div class="item-par">Par: ' + item.par + (item.par === 1 ? ' unit' : ' units') + '</div>';
    if (item.notes) html += '<div class="item-notes">' + item.notes + '</div>';
    html += '<div class="status-btns">';
    html += '<button class="status-btn full' + (s === 'full' ? ' selected' : '') + '" onclick="setStatus(\'' + item.itemNumber + '\', \'full\')">\u2705 Full</button>';
    html += '<button class="status-btn low' + (s === 'low' ? ' selected' : '') + '" onclick="setStatus(\'' + item.itemNumber + '\', \'low\')">\ud83d\udfe1 Low</button>';
    html += '<button class="status-btn empty' + (s === 'empty' ? ' selected' : '') + '" onclick="setStatus(\'' + item.itemNumber + '\', \'empty\')">\ud83d\udd34 Empty</button>';
    html += '</div></div>';
  });
  html += '</div>';

  html += '<div class="bottom-spacer"></div>';
  html += '<div class="action-bar">';
  html += '<button class="action-btn btn-secondary" onclick="state.view=\'locations\';render()">Locations</button>';

  // Find next unchecked location
  const nextLoc = LOC_ORDER.find(l => l !== loc && LOCATIONS[l] && getLocationStats(l).pending > 0);
  if (locStats.pending === 0 && nextLoc) {
    html += '<button class="action-btn btn-primary" onclick="state.currentLocation=\'' + nextLoc + '\';state.search=\'\';state.filter=\'all\';render()">Next: ' + nextLoc + ' \u25B6</button>';
  } else {
    const orderCount = getOrderItems().length;
    html += '<button class="action-btn btn-primary" onclick="state.view=\'summary\';render()">Review Order' + (orderCount > 0 ? ' (' + orderCount + ')' : '') + '</button>';
  }
  html += '</div>';

  app.innerHTML = html;
}

function renderSummary(app) {
  const orderItems = getOrderItems();
  const overall = getOverallStats();

  // Group by location
  const byLoc = {};
  orderItems.forEach(item => {
    if (!byLoc[item.location]) byLoc[item.location] = [];
    byLoc[item.location].push(item);
  });

  let html = '<div class="header">';
  html += '<div style="display:flex;align-items:center"><button class="back-btn" onclick="state.view=\'locations\';render()">\u2190 Back</button>';
  html += '<div><div style="font-size:17px;font-weight:600">Order Summary</div>';
  html += '<div class="subtitle">' + orderItems.length + ' items to order</div></div></div>';
  html += '</div>';

  html += '<div class="summary">';

  // Warning if items unchecked
  if (overall.pending > 0) {
    html += '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:12px;margin-bottom:12px;font-size:14px">';
    html += '<strong>\u26A0\uFE0F ' + overall.pending + ' items not checked yet.</strong> Go back and finish counting before submitting.';
    html += '</div>';
  }

  if (orderItems.length === 0) {
    html += '<div style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:10px">\u2705</div>';
    html += '<div style="font-size:18px;font-weight:600">Everything is stocked!</div>';
    html += '<div style="color:#666;margin-top:4px">No items need to be ordered.</div></div>';
  } else {
    // Stats
    html += '<div class="stats-bar" style="margin:0 0 12px">';
    const lowCount = orderItems.filter(i => i.status === 'low').length;
    const emptyCount = orderItems.filter(i => i.status === 'empty').length;
    html += '<div class="stat"><div class="stat-num orange">' + lowCount + '</div><div class="stat-label">Low Items</div></div>';
    html += '<div class="stat"><div class="stat-num red">' + emptyCount + '</div><div class="stat-label">Empty Items</div></div>';
    html += '<div class="stat"><div class="stat-num" style="color:#2980b9">' + orderItems.length + '</div><div class="stat-label">Total to Order</div></div>';
    html += '</div>';

    LOC_ORDER.forEach(loc => {
      if (!byLoc[loc] || byLoc[loc].length === 0) return;
      html += '<div class="summary-section">';
      html += '<h3>' + loc + ' (' + byLoc[loc].length + ')</h3>';
      byLoc[loc].forEach(item => {
        const qtyClass = item.status === 'low' ? 'order-qty low-qty' : 'order-qty';
        html += '<div class="summary-item">';
        html += '<div style="flex:1"><div style="font-weight:500">' + item.description + '</div>';
        html += '<div style="font-size:12px;color:#999">' + item.itemNumber + ' &middot; Par: ' + item.par + '</div></div>';
        html += '<div class="' + qtyClass + '">' + item.orderQty + '</div>';
        html += '</div>';
      });
      html += '</div>';
    });
  }

  html += '</div>';

  html += '<div class="bottom-spacer"></div>';
  html += '<div class="action-bar">';
  html += '<button class="action-btn btn-secondary" onclick="state.view=\'locations\';render()">Back</button>';
  if (orderItems.length > 0) {
    html += '<button class="action-btn btn-export" onclick="exportCSV()">Export Order \u2B07</button>';
  }
  html += '</div>';

  app.innerHTML = html;
}

// Initialize
render();
</script>
</body>
</html>
